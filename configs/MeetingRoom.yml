MODEL:
  DEVICE: "cuda"
  DEVICE_ID: ('0')
  MODE: 'test'
  DETECTION: 'yolov8'
  RESUME: false
  LAST_CKPT_FILE: './'

DATASET:
  DIR: './datasets/'
  NAME: 'MeetingRoom'
  SEQUENCE: ['sequence1']
  CAMS: 4
  TOTAL_FRAMES: 1000

FE:
  CHOICE: 'CNN'
  INPUT_SIZE: (256, 128)

SOLVER:
  TYPE: 'TG'
  EPOCHS: 100
  EVAL_EPOCH: 2
  BATCH_SIZE: 32
  LR: 0.01
  MAX_PASSING_STEPS: 4
  W: 3
  W_TEST: 5
  FOCAL_ALPHA: 0.98
  FOCAL_GAMMA: 5

OUTPUT:
  VISUALIZE: True
  LOG: True
  CKPT_DIR: './logs/ckpts'
  INFERENCE_DIR: './logs/inference'

TEST:
  CKPT_FILE_SG: './'
  CKPT_FILE_TG: './'
  FRAME_START: 0
  EDGE_THRESH: 0.9
